server {
    listen 80;
    server_name 54-90-5-8.sslip.io;

    root /var/www/kyron-scribe;
    index index.html;

    # SSE streaming (note generation): disable buffering so tokens flush to the client as
    # they arrive instead of nginx batching the whole response before forwarding it.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;
    }
}
