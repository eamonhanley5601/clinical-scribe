services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: scribe
      POSTGRES_PASSWORD: scribe
      POSTGRES_DB: clinical_scribe
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scribe"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://scribe:scribe@db:5432/clinical_scribe
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  db_data:
